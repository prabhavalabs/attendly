# Local/VPS infrastructure for the attendly Go backend.
# `make docker-up` builds and starts this; data persists in the named volume.
services:
  backend:
    build:
      context: ./apps/api
      target: runtime
    image: attendly-backend:local
    container_name: attendly-backend
    env_file:
      - ./apps/api/.env
    environment:
      ADDR: ":8787"
      DB_PATH: /data/attendly.db
      ASSETS_DIR: /data/assets
    # Bind to loopback only — the API is reached through the host nginx reverse
    # proxy (with Cloudflare in front), never directly from the internet.
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - attendly-data:/data
    restart: unless-stopped

volumes:
  attendly-data:
