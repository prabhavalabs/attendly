# attendly API — host nginx reverse-proxy vhost for the shared VPS.
#
# Mirrors the existing Cloudflare-proxied :80 pattern on this box (TLS is
# terminated at Cloudflare; the origin serves plain HTTP on :80, routed by
# Host header). The attendly backend container binds 127.0.0.1:8787.
#
# Install (one-time, as root on the VPS):
#   cp /opt/attendly/deploy/nginx/attendly-api.conf /etc/nginx/sites-available/attendly-api
#   ln -s /etc/nginx/sites-available/attendly-api /etc/nginx/sites-enabled/attendly-api
#   nginx -t && systemctl reload nginx
#
# DNS: attendly-api.junioremployer.com → A → 178.104.111.17 (Cloudflare proxied).

server {
    listen 80;
    listen [::]:80;
    server_name attendly-api.junioremployer.com;

    # Student photos + generated PDFs (ID cards, receipts) can be a few MB.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
