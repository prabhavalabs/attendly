name: CI

# Validate every PR (and pushes to the long-lived branches): the Go backend
# (vet, race tests, build) and the admin portal (typecheck, build).

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Go backend (vet · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test (race)
        run: go test -race ./...
      - name: build (static binary)
        run: CGO_ENABLED=0 go build -trimpath -o bin/attendly-api ./cmd/server

  admin:
    name: Admin portal (typecheck · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tuition/admin typecheck
      - run: pnpm --filter @tuition/admin build
