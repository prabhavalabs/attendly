name: Deploy

# Runs after a PR is merged into main (a push to main). Deploys the Go backend
# to the VPS over SSH: pull the latest code and rebuild/restart the Docker
# Compose stack. SQLite data persists in the named volume on the host.
#
# Required GitHub configuration (Settings → Secrets and variables → Actions):
#   Secrets:
#     VPS_HOST        - VPS hostname or IP
#     VPS_USER        - SSH user
#     VPS_SSH_KEY     - private SSH key (PEM) authorized on the VPS
#   Variables:
#     VPS_APP_DIR     - path to the checked-out repo on the VPS (e.g. /opt/attendly)
#     VPS_PORT        - SSH port (optional, default 22)
#
# One-time on the VPS (see DEPLOYMENT.md): clone the repo to VPS_APP_DIR, create
# apps/api/.env with the production secrets, install Docker + Compose, and put a
# reverse proxy (Caddy/nginx) in front for HTTPS.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ vars.VPS_APP_DIR }}"
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            # health check
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8787/api/health >/dev/null; then
                echo "healthy"; exit 0
              fi
              sleep 3
            done
            echo "health check failed"; docker compose logs --tail=50 backend; exit 1
