name: Deploy

# Runs after a PR is merged into main (a push to main). Applies D1 migrations
# to production, deploys the API Worker (with its D1 / R2 bindings and crons),
# then builds and deploys the admin portal to Cloudflare Pages.
#
# Required GitHub configuration (Settings → Secrets and variables → Actions):
#   Secrets:
#     CLOUDFLARE_API_TOKEN     - token with Workers Scripts, D1 and Pages edit
#     CLOUDFLARE_ACCOUNT_ID    - your Cloudflare account id
#     JWT_SECRET               - (optional) synced to the Worker on deploy
#     ENCRYPTION_KEY           - (optional) synced to the Worker on deploy
#     GOOGLE_CLIENT_ID         - (optional) synced to the Worker on deploy
#     GOOGLE_CLIENT_SECRET     - (optional) synced to the Worker on deploy
#   Variables:
#     CF_D1_DATABASE_ID        - id of the production `tuition-db` D1 database
#     CF_PAGES_PROJECT         - Cloudflare Pages project name (e.g. attendly-admin)
#     VITE_API_BASE_URL        - public API URL the admin build points at
#     CORS_ORIGINS             - (optional) comma-separated allowed origins
#
# One-time prerequisites (see DEPLOYMENT.md): create the D1 database, the R2
# bucket `attendly-assets`, and the Pages project.

on:
  push:
    branches: [main]

# Never run two production deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate · deploy API · deploy admin
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (gate)
        run: pnpm typecheck

      - name: Inject production D1 database id
        run: |
          if [ -z "${{ vars.CF_D1_DATABASE_ID }}" ]; then
            echo "::error::CF_D1_DATABASE_ID variable is not set"; exit 1
          fi
          sed -i "s/PASTE_ID/${{ vars.CF_D1_DATABASE_ID }}/" apps/api/wrangler.toml
          grep -q "PASTE_ID" apps/api/wrangler.toml && { echo "::error::database_id placeholder still present"; exit 1; } || true

      - name: Apply D1 migrations (production)
        working-directory: apps/api
        run: pnpm exec wrangler d1 migrations apply tuition-db --remote

      - name: Sync Worker secrets (only those provided)
        working-directory: apps/api
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          put() {
            local name="$1" value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | pnpm exec wrangler secret put "$name"
              echo "synced $name"
            else
              echo "skip $name (not set)"
            fi
          }
          put JWT_SECRET "$JWT_SECRET"
          put ENCRYPTION_KEY "$ENCRYPTION_KEY"
          put GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          put GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"

      - name: Deploy API Worker
        working-directory: apps/api
        run: pnpm exec wrangler deploy

      - name: Build admin portal
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm --filter @tuition/admin build

      - name: Deploy admin portal (Cloudflare Pages)
        working-directory: apps/api
        run: >
          pnpm exec wrangler pages deploy ../admin/dist
          --project-name "${{ vars.CF_PAGES_PROJECT }}"
          --branch main
          --commit-dirty=true
