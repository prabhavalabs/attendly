# air live-reload config (used in the Docker dev stage). Rebuilds + restarts
# the server on any .go change.
root = "."
tmp_dir = "tmp"

[build]
cmd = "CGO_ENABLED=0 go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
include_ext = ["go"]
exclude_dir = ["tmp", "data", "bin"]
delay = 400
stop_on_error = true

[log]
time = true
